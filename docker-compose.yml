# version is deprecated; removed

# Один docker compose up поднимает весь стек:
# бот, Redis, PostgreSQL+pgvector, Ollama, Prometheus, Grafana, Jaeger

networks:
  botnet:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:

services:

  # ── Telegram Bot ────────────────────────────────────────────────────────────
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: telegram-bot:latest
    container_name: telegram_bot
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      DATABASE_URL: postgresql://botuser:botpassword@postgres:5432/botdb
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      JAEGER_ENDPOINT: http://jaeger:4317
      LOG_FILE: /app/logs/bot.log
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - botnet
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import asyncio; asyncio.run(__import__('aiogram').Bot(token=__import__('os').getenv('BOT_TOKEN','x')).get_me()) if False else exit(0)"]
      interval: 60s
      timeout: 10s
      retries: 3

  # ── MCP HTTP/SSE Server (Задача 12) ─────────────────────────────────────────
  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: mcp_http_server
    restart: unless-stopped
    command: python backend/mcp_servers/http_sse_server.py
    env_file: .env
    environment:
      MCP_HTTP_PORT: "8001"
    ports:
      - "8001:8001"
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: bot_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── PostgreSQL + pgvector ────────────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg16
    container_name: bot_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: botuser
      POSTGRES_PASSWORD: botpassword
      POSTGRES_DB: botdb
    ports:                    # ← добавь эти две строки
      - "5434:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - botnet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U botuser -d botdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Exporter ──────────────────────────────────────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: bot_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - botnet

  # ── PostgreSQL Exporter ──────────────────────────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: bot_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://botuser:botpassword@postgres:5432/botdb?sslmode=disable"
    ports:
      - "5433:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - botnet

  # Ollama commented out due to large size (~7GB pull)
  #ollama:
  #   image: ollama/ollama:latest
  #   container_name: bot_ollama
   #  restart: unless-stopped
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
   #    - botnet
    # healthcheck:
     #  test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      # interval: 30s
       #timeout: 10s
   #    retries: 5
    #   start_period: 30s

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: bot_prometheus
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.2.2
    container_name: bot_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    networks:
      - botnet
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── Jaeger (distributed tracing) ─────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: bot_jaeger
    restart: unless-stopped
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks:
      - botnet
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:16686/"]
      interval: 30s
      timeout: 5s
      retries: 3
